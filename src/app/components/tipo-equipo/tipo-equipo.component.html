<div class="container mt-4">
  <div class="card p-4 shadow-sm mb-4">
    <h3>Gestión de Tipos de Equipo</h3>

    <form (ngSubmit)="guardar(tipoForm)" #tipoForm="ngForm">
      <div class="row">
        <div class="col-md-9 mb-3">
          <label
            >Nombre del Tipo (Ej. Laptop, Monitor, Impresora)
            <span class="text-danger">*</span></label
          >
          <input
            [(ngModel)]="tipoEquipo.nombreTipo"
            name="nombreTipo"
            class="form-control"
            required
            minlength="3"
            #nombreInput="ngModel"
            [ngClass]="{
              'is-invalid': nombreInput.invalid && (nombreInput.dirty || nombreInput.touched),
            }"
          />
          <div
            *ngIf="nombreInput.invalid && (nombreInput.dirty || nombreInput.touched)"
            class="invalid-feedback"
          >
            <span *ngIf="nombreInput.errors?.['required']">El nombre del tipo es obligatorio.</span>
            <span *ngIf="nombreInput.errors?.['minlength']">Debe tener al menos 3 caracteres.</span>
          </div>
        </div>

        <div class="col-md-3 mb-3 d-flex align-items-end gap-2">
          <button type="submit" class="btn btn-info w-100 text-white" [disabled]="tipoForm.invalid">
            Guardar
          </button>

          <button
            type="button"
            class="btn btn-secondary w-100"
            (click)="limpiar(tipoForm)"
            *ngIf="tipoEquipo.tipoId || tipoForm.dirty"
          >
            Cancelar
          </button>
        </div>

        <div *ngIf="mensajeExito" class="alert alert-success mt-3" role="alert">
          {{ mensajeAccion }}
        </div>
        <div *ngIf="mensajeError" class="alert alert-danger mt-3" role="alert">
          Ocurrió un error al guardar el tipo de equipo.
        </div>
      </div>
    </form>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre del Tipo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of lista">
        <td>{{ t.tipoId }}</td>
        <td>{{ t.nombreTipo }}</td>
        <td>
          <button (click)="editar(t)" class="btn btn-warning btn-sm me-2">Editar</button>
          <button (click)="eliminar(t.tipoId)" class="btn btn-danger btn-sm">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
