<div class="login-wrapper d-flex justify-content-center align-items-center vh-100">
  <div class="card login-card shadow-lg border-0 rounded-4">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-5">
        <div
          class="icon-circle bg-primary-subtle text-primary mb-3 mx-auto d-flex justify-content-center align-items-center rounded-circle"
          style="width: 60px; height: 60px"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 0a.5.5 0 0 1 .5.5v2.268c1.564.415 2.922 1.487 3.65 2.991A5.002 5.002 0 0 1 12.99 11h2.51a.5.5 0 0 1 0 1h-2.51a4.998 4.998 0 0 1-4.49 2.991A5.002 5.002 0 0 1 .5 10a.5.5 0 0 1 1 0 4 4 0 0 0 3.99 3.99A4.002 4.002 0 0 0 8 13.51V16a.5.5 0 0 1-1 0v-2.51a5.002 5.002 0 0 1-3.65-2.991A5.002 5.002 0 0 1 3.01 5H.5a.5.5 0 0 1 0-1h2.51A4.998 4.998 0 0 1 7.5 1.009V.5A.5.5 0 0 1 8 0z"
            />
          </svg>
        </div>
        <h2 class="fw-bold" style="color: var(--eco-secondary, #334155)">EcoDigital</h2>
        <p class="text-muted">Sistema de Gestión de Donaciones</p>
      </div>

      <form (ngSubmit)="iniciarSesion()">
        <div class="mb-4">
          <label for="correo" class="form-label fw-semibold text-muted small"
            >Correo Electrónico</label
          >
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0 text-muted">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                fill="currentColor"
                viewBox="0 0 16 16"
              >
                <path
                  d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757Zm3.436-.586L16 11.801V4.697l-5.803 3.546Z"
                />
              </svg>
            </span>
            <input
              type="email"
              class="form-control border-start-0 ps-0"
              id="correo"
              name="correo"
              [(ngModel)]="credenciales.correo"
              placeholder="ejemplo@ecodigital.org"
              required
            />
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold text-muted small">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0 text-muted">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                fill="currentColor"
                viewBox="0 0 16 16"
              >
                <path
                  d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"
                />
              </svg>
            </span>
            <input
              type="password"
              class="form-control border-start-0 ps-0"
              id="password"
              name="contrasena"
              [(ngModel)]="credenciales.contrasena"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <div
          *ngIf="errorLogin"
          class="alert alert-danger p-3 text-center rounded-3 small border-0 bg-danger text-white mb-4 shadow-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-exclamation-triangle-fill me-2"
            viewBox="0 0 16 16"
          >
            <path
              d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"
            />
          </svg>
          Credenciales incorrectas. Intente nuevamente.
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm rounded-3 mt-2">
          Ingresar al Sistema
        </button>
      </form>
    </div>
  </div>
</div>
