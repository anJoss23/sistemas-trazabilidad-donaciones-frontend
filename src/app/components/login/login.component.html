<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px">
    <div class="text-center mb-4">
      <h2 class="text-success">EcoDigital</h2>
      <p class="text-muted">Sistema de Gestión de Donaciones</p>
    </div>

    <form (ngSubmit)="iniciarSesion()">
      <div class="mb-3">
        <label for="correo" class="form-label">Correo Electrónico</label>
        <input
          type="email"
          class="form-control"
          id="correo"
          name="correo"
          [(ngModel)]="credenciales.correo"
          placeholder="ejemplo@ecodigital.org"
          required
        />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="contrasena"
          [(ngModel)]="credenciales.contrasena"
          placeholder="******"
          required
        />
      </div>

      <div *ngIf="errorLogin" class="alert alert-danger p-2 text-center">
        Credenciales incorrectas. Intente nuevamente.
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-3">Iniciar Sesión</button>
    </form>
  </div>
</div>
