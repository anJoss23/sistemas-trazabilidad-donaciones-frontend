<div class="container mt-4">
  <h3>Gestión de Roles</h3>
  <form (ngSubmit)="guardar()" class="mb-4">
    <input
      [(ngModel)]="rol.nombreRol"
      name="nombre"
      class="form-control mb-2"
      placeholder="Nombre del rol"
      required
    />
    <button type="submit" class="btn btn-primary">Guardar</button>
  </form>

  <div *ngIf="mensajeExito" class="alert alert-success">¡Rol {{ mensajeAccion }} exitosamente!</div>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre del Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of lista">
        <td>{{ r.nombreRol }}</td>
        <td>
          <button (click)="editar(r)" class="btn btn-warning btn-sm me-2">Editar</button>
          <button (click)="eliminar(r.rolId)" class="btn btn-danger btn-sm">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
