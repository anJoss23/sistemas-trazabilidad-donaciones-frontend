<div class="container mt-4">
  <h3>Gestión de Roles</h3>

  <form (ngSubmit)="guardar(rolForm)" #rolForm="ngForm" class="mb-4">
    <div class="position-relative">
      <label class="fw-bold">Nombre del ROL del usuario <span class="text-danger">*</span></label>
      <input
        [(ngModel)]="rol.nombreRol"
        name="nombre"
        class="form-control mb-2"
        placeholder="Nombre del rol *"
        required
        minlength="3"
        #nombreInput="ngModel"
        [ngClass]="{
          'is-invalid': nombreInput.invalid && (nombreInput.dirty || nombreInput.touched),
        }"
      />
      <div
        *ngIf="nombreInput.invalid && (nombreInput.dirty || nombreInput.touched)"
        class="invalid-feedback mb-2"
      >
        <span *ngIf="nombreInput.errors?.['required']">El nombre del rol es obligatorio.</span>
        <span *ngIf="nombreInput.errors?.['minlength']">Debe tener al menos 3 caracteres.</span>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="rolForm.invalid">Guardar</button>

    <button
      type="button"
      class="btn btn-secondary ms-2"
      (click)="limpiar(rolForm)"
      *ngIf="rol.rolId || rolForm.dirty"
    >
      Cancelar
    </button>

    <div *ngIf="mensajeExito" class="alert alert-success mt-3" role="alert">
      {{ mensajeAccion }}
    </div>
    <div *ngIf="mensajeError" class="alert alert-danger mt-3" role="alert">
      Ocurrió un error al guardar el rol.
    </div>
  </form>

  <table class="table">
    <thead>
      <tr>
        <th>Nombre del Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of lista">
        <td>{{ r.nombreRol }}</td>
        <td>
          <button (click)="editar(r)" class="btn btn-warning btn-sm me-2">Editar</button>
          <button (click)="eliminar(r.rolId)" class="btn btn-danger btn-sm">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
