<div class="d-flex">
  <nav class="eco-sidebar d-flex flex-column p-3" *ngIf="showMenu">
    <div class="sidebar-header text-center mb-3 mt-2">
      <div
        class="icon-circle bg-primary-subtle text-primary mx-auto mb-2 d-flex justify-content-center align-items-center rounded-circle shadow-sm"
        style="width: 45px; height: 45px"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="currentColor"
          viewBox="0 0 16 16"
        >
          <path
            d="M8 0a.5.5 0 0 1 .5.5v2.268c1.564.415 2.922 1.487 3.65 2.991A5.002 5.002 0 0 1 12.99 11h2.51a.5.5 0 0 1 0 1h-2.51a4.998 4.998 0 0 1-4.49 2.991A5.002 5.002 0 0 1 .5 10a.5.5 0 0 1 1 0 4 4 0 0 0 3.99 3.99A4.002 4.002 0 0 0 8 13.51V16a.5.5 0 0 1-1 0v-2.51a5.002 5.002 0 0 1-3.65-2.991A5.002 5.002 0 0 1 3.01 5H.5a.5.5 0 0 1 0-1h2.51A4.998 4.998 0 0 1 7.5 1.009V.5A.5.5 0 0 1 8 0z"
          />
        </svg>
      </div>
      <h5 class="text-white fw-bold m-0 tracking-wide">EcoDigital</h5>
    </div>

    <hr class="eco-divider" />

    <ul class="nav nav-pills flex-column mb-auto eco-nav">
      <li class="nav-item">
        <a routerLink="/dashboard" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/equipos" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-pc-display"></i> Equipos
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/donantes" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-person-heart"></i> Donantes
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/instituciones" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-building"></i> Instituciones
        </a>
      </li>

      <li
        *ngIf="rolUsuario !== 'REGISTRADOR' && rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'"
      >
        <a routerLink="/usuarios" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-people-fill"></i> Usuarios
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/despachos" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-truck"></i> Despachos
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'ADMINISTRADOR' && rolUsuario !== 'REGISTRADOR'">
        <a routerLink="/historial" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-clock-history"></i> Historial
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/tipo-equipo" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-tags-fill"></i> Tipos de Equipo
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/estados-equipo" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-check-circle-fill"></i> Estados de Equipo
        </a>
      </li>

      <li
        *ngIf="rolUsuario !== 'REGISTRADOR' && rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'"
      >
        <a routerLink="/roles" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-shield-lock-fill"></i> Roles de Usuario
        </a>
      </li>

      <li *ngIf="rolUsuario !== 'TECNICO' && rolUsuario !== 'TÉCNICO'">
        <a routerLink="/reportes" class="nav-link" routerLinkActive="active-eco">
          <i class="bi bi-file-earmark-bar-graph-fill"></i> Reportes
        </a>
      </li>
    </ul>

    <div class="mt-auto pt-3">
      <div *ngIf="usuarioActual as user" class="user-profile p-3 mb-3 text-center rounded-3">
        <small
          class="text-white-50 d-block mb-1"
          style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px"
          >Conectado como</small
        >
        <span class="fw-bold d-block text-truncate text-white" title="{{ user.sub }}">
          {{ user.sub }}
        </span>
        <span class="badge bg-primary-eco mt-2 fw-normal px-3 py-2 rounded-pill shadow-sm">
          {{ user.role || user.rol || user.authorities || 'Usuario' }}
        </span>
      </div>

      <button
        (click)="logout()"
        class="btn btn-logout w-100 d-flex justify-content-center align-items-center gap-2"
      >
        <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
      </button>
    </div>
  </nav>

  <main [class.flex-grow-1]="showMenu" class="main-content flex-grow-1">
    <router-outlet></router-outlet>
  </main>
</div>
